<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex, nofollow" />
		<title>We Offsite — Admin</title>
		<link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
		<script>
			(function () {
				var origin = window.location.origin;

				function forwardToDecap(message) {
					if (typeof message !== 'string') return;
					window.postMessage(message, origin);
				}

				try {
					var channel = new BroadcastChannel('decap_github_oauth');
					channel.onmessage = function (event) {
						var message = event.data;
						forwardToDecap(message);

						if (message === 'authorizing:github') {
							channel.postMessage(message);
						}
					};
				} catch (error) {
					/* BroadcastChannel unavailable */
				}

				window.addEventListener('storage', function (event) {
					if (event.key !== 'decap_cms_github_auth' || !event.newValue) return;
					forwardToDecap(event.newValue);
					localStorage.removeItem('decap_cms_github_auth');
				});

				setInterval(function () {
					var pending = localStorage.getItem('decap_cms_github_auth');
					if (!pending) return;
					localStorage.removeItem('decap_cms_github_auth');
					forwardToDecap(pending);
				}, 500);
			})();
		</script>
	</head>
	<body>
		<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
	</body>
</html>
